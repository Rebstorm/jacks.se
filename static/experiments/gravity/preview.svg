<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" fill="#1a3a6a" rx="16"/>
  <defs>
    <radialGradient id="ballBase" cx="40%" cy="36%" r="65%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="60%" stop-color="#ddd8cf"/>
      <stop offset="100%" stop-color="#c0b8b0"/>
    </radialGradient>
    <radialGradient id="ballShine" cx="36%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="ballClip">
      <circle cx="64" cy="64" r="46"/>
    </clipPath>
  </defs>
  <!-- Base sphere -->
  <circle cx="64" cy="64" r="46" fill="url(#ballBase)"/>
  <!-- Marble veins, clipped to ball -->
  <g clip-path="url(#ballClip)" opacity="0.55">
    <path d="M 20 50 C 50 20, 80 90, 110 60" stroke="#9a9090" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 30 80 C 55 40, 85 100, 115 70" stroke="#b0a8a0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 18 70 C 48 100, 75 30, 105 55" stroke="#7a7272" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 40 18 C 60 55, 90 45, 108 90" stroke="#8a8282" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Specular highlight -->
  <circle cx="64" cy="64" r="46" fill="url(#ballShine)"/>
</svg>
